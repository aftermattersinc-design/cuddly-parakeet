<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome - After Matters</title>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,400;0,6..96,600;1,6..96,400&family=EB+Garamond:ital,wght@0,400;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --night:#0d1520;--deep:#112035;--ocean:#1a3a5c;
  --mist:#6b9ab8;--foam:#c8dde9;--beam:#f5c842;--beam-dim:rgba(245,200,66,.1);
  --black:#080808;--charcoal:#1a1a1a;--graphite:#252525;
  --silver:#c0c0c0;--dust:#d0d0d0;--white:#fefefe;
  --green:#4a9e7a;--green-dim:rgba(74,158,122,.12);
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Jost',sans-serif;background:var(--night);color:var(--white);cursor:none;display:flex;flex-direction:column;}

/* CURSOR */
.cursor{position:fixed;width:7px;height:7px;background:var(--beam);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);}
.cursor-ring{position:fixed;width:28px;height:28px;border:1px solid rgba(245,200,66,.28);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);}

/* ── NAV BAR ── */
.ob-nav{
  flex-shrink:0;height:52px;
  background:rgba(8,8,8,.95);border-bottom:1px solid rgba(255,255,255,0.33);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 36px;
}
.ob-logo{font-family:'Bodoni Moda',serif;font-size:.9rem;color:var(--white);display:flex;align-items:center;gap:10px;}
.ob-logo svg{opacity:.6;}
.ob-progress-wrap{display:flex;align-items:center;gap:14px;}
.ob-progress-label{font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,0.44);}
.ob-progress-track{width:120px;height:2px;background:rgba(255,255,255,0.35);}
.ob-progress-fill{height:100%;background:var(--beam);transition:width .6s ease;}
.ob-skip{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,0.42);background:none;border:none;cursor:none;transition:color .3s;font-family:'Jost',sans-serif;}
.ob-skip:hover{color:rgba(255,255,255,.5);}

/* ── MAIN STAGE ── */
.ob-stage{
  flex:1;display:flex;overflow:hidden;position:relative;
}

/* Background illustrations */
.ob-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.ob-bg-lh{position:absolute;right:0;bottom:0;opacity:.06;}
.ob-bg-waves{position:absolute;bottom:0;left:0;right:0;height:140px;opacity:.07;}
.ob-bg-grid{position:absolute;inset:0;opacity:.018;}

/* ── CONVERSATION PANE ── */
.ob-convo{
  flex:1;display:flex;flex-direction:column;
  max-width:680px;margin:0 auto;width:100%;
  padding:0 40px;
  position:relative;z-index:2;
}

/* Message feed */
.ob-feed{
  flex:1;overflow-y:auto;
  padding:40px 0 20px;
  display:flex;flex-direction:column;
  gap:0;
}
.ob-feed::-webkit-scrollbar{width:3px;}
.ob-feed::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.35);}

/* Guide message */
.msg-guide{
  display:flex;gap:14px;align-items:flex-start;
  margin-bottom:24px;
  animation:msgIn .4s ease both;
}
.guide-avatar{
  width:32px;height:32px;flex-shrink:0;
  border-radius:50%;background:var(--beam-dim);
  border:1px solid rgba(245,200,66,.2);
  display:flex;align-items:center;justify-content:center;
  margin-top:2px;
}
.guide-avatar svg{width:16px;height:16px;opacity:.7;}
.guide-bubble-wrap{flex:1;}
.guide-name{font-size:.55rem;letter-spacing:.22em;text-transform:uppercase;color:var(--beam);margin-bottom:7px;display:flex;align-items:center;gap:8px;}
.guide-name::before{content:'';display:block;width:12px;height:1px;background:var(--beam);}
.guide-bubble{
  background:rgba(255,255,255,0.32);border:1px solid rgba(255,255,255,0.35);
  padding:18px 22px;
  font-family:'EB Garamond',serif;font-style:italic;
  font-size:1.05rem;line-height:1.8;color:rgba(255,255,255,.75);
  position:relative;
}
.guide-bubble.large{font-size:1.2rem;}
.guide-bubble strong{font-style:normal;color:var(--white);font-weight:500;}

/* Typing indicator */
.typing{
  display:flex;gap:5px;align-items:center;padding:14px 18px;
  background:rgba(255,255,255,0.31);border:1px solid rgba(255,255,255,0.34);
  width:fit-content;
}
.typing-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.48);animation:typingBounce 1.2s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes typingBounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* User reply */
.msg-user{
  display:flex;justify-content:flex-end;
  margin-bottom:28px;
  animation:msgIn .3s ease both;
}
.user-bubble{
  background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.18);
  padding:13px 18px;
  font-size:.85rem;font-weight:300;color:rgba(255,255,255,.8);
  max-width:70%;
}

/* ── CHOICE CARDS ── */
.ob-choices{
  display:flex;flex-direction:column;gap:8px;margin-top:4px;margin-bottom:24px;
  animation:choicesIn .4s ease both;
}
.ob-choices.row{flex-direction:row;flex-wrap:wrap;}
.choice-card{
  background:rgba(255,255,255,0.31);border:1px solid rgba(255,255,255,0.36);
  padding:16px 20px;cursor:none;
  display:flex;align-items:flex-start;gap:14px;
  transition:background .25s,border-color .25s;
  text-align:left;width:100%;font-family:'Jost',sans-serif;
}
.choice-card:hover{background:rgba(255,255,255,0.35);border-color:rgba(255,255,255,0.4);}
.choice-card.selected{background:var(--beam-dim);border-color:rgba(245,200,66,.35);}
.ob-choices.row .choice-card{flex:1;min-width:140px;flex-direction:column;gap:8px;align-items:flex-start;}
.choice-icon{font-size:1.1rem;flex-shrink:0;margin-top:1px;opacity:.7;}
.choice-body{}
.choice-title{font-size:.85rem;color:var(--white);margin-bottom:3px;}
.choice-desc{font-size:.72rem;font-weight:300;color:var(--silver);line-height:1.5;}

/* Plan cards */
.plan-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px;animation:choicesIn .4s ease both;}
.plan-card{
  background:rgba(255,255,255,0.31);border:1px solid rgba(255,255,255,0.35);
  padding:22px 18px;cursor:none;transition:all .25s;text-align:left;
  font-family:'Jost',sans-serif;
}
.plan-card:hover{background:rgba(255,255,255,0.34);border-color:rgba(255,255,255,0.37);}
.plan-card.selected{background:var(--beam-dim);border-color:rgba(245,200,66,.35);}
.plan-card.recommended{border-color:rgba(245,200,66,.2);}
.pc-tier{font-size:.52rem;letter-spacing:.28em;text-transform:uppercase;color:var(--beam);margin-bottom:6px;}
.pc-name{font-family:'Bodoni Moda',serif;font-size:1rem;color:var(--white);margin-bottom:4px;}
.pc-price{font-size:.8rem;color:var(--silver);margin-bottom:12px;}
.pc-features{display:flex;flex-direction:column;gap:5px;}
.pc-feat{font-size:.65rem;font-weight:300;color:rgba(255,255,255,0.52);display:flex;gap:7px;}
.pc-feat::before{content:'';display:inline-block;width:10px;height:10px;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 10 10' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1.5 5L4 7.5L8.5 2.5' stroke='%234a9e7a' stroke-width='1.2' stroke-linecap='round'/%3E%3C/svg%3E");background-size:contain;background-repeat:no-repeat;flex-shrink:0;margin-top:2px;}
.pc-rec{font-size:.52rem;letter-spacing:.18em;text-transform:uppercase;background:var(--beam-dim);color:var(--beam);border:1px solid rgba(245,200,66,.2);padding:3px 8px;display:inline-block;margin-bottom:8px;}

/* ── INPUT AREA ── */
.ob-input-zone{
  flex-shrink:0;padding:20px 0 28px;
  border-top:1px solid rgba(255,255,255,0.33);
}
.ob-input-row{display:flex;gap:10px;align-items:stretch;}
.ob-text-input{
  flex:1;padding:14px 18px;
  background:rgba(255,255,255,0.32);border:1px solid rgba(255,255,255,0.36);
  font-family:'Jost',sans-serif;font-size:.88rem;font-weight:300;
  color:var(--white);outline:none;transition:border-color .3s;
}
.ob-text-input::placeholder{color:rgba(255,255,255,0.42);}
.ob-text-input:focus{border-color:rgba(245,200,66,.4);}
.ob-send{
  padding:14px 24px;background:var(--beam);color:var(--black);
  border:none;font-family:'Jost',sans-serif;font-size:.65rem;
  font-weight:500;letter-spacing:.18em;text-transform:uppercase;
  cursor:none;transition:background .3s;white-space:nowrap;
}
.ob-send:hover{background:var(--white);}
.ob-send:disabled{background:rgba(255,255,255,0.36);color:rgba(255,255,255,0.42);cursor:default;}

/* Invite row */
.invite-row{display:flex;gap:8px;margin-bottom:8px;animation:msgIn .3s ease both;}
.invite-input{flex:1;padding:11px 14px;background:rgba(255,255,255,0.32);border:1px solid rgba(255,255,255,0.35);font-family:'Jost',sans-serif;font-size:.8rem;font-weight:300;color:var(--white);outline:none;transition:border-color .3s;}
.invite-input::placeholder{color:rgba(255,255,255,0.42);}
.invite-input:focus{border-color:rgba(245,200,66,.35);}
.invite-add{padding:11px 16px;background:rgba(255,255,255,0.33);border:1px solid rgba(255,255,255,0.36);font-family:'Jost',sans-serif;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--silver);cursor:none;transition:all .3s;white-space:nowrap;}
.invite-add:hover{border-color:var(--beam);color:var(--beam);}
.invited-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.invited-item{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--green-dim);border:1px solid rgba(74,158,122,.2);}
.invited-avatar{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:500;color:var(--black);flex-shrink:0;}
.invited-name{font-size:.78rem;color:var(--white);flex:1;}
.invited-status{font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:var(--green);}

/* Task preview */
.task-preview{
  background:rgba(255,255,255,0.31);border:1px solid rgba(255,255,255,0.34);
  margin-bottom:8px;animation:msgIn .3s ease both;
}
.tp-header{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.33);font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--silver);}
.tp-item{
  padding:12px 18px;border-bottom:1px solid rgba(255,255,255,0.32);
  display:flex;align-items:center;gap:12px;
}
.tp-item:last-child{border-bottom:none;}
.tp-cb{width:16px;height:16px;border-radius:50%;border:1px solid rgba(255,255,255,0.4);flex-shrink:0;}
.tp-text{font-size:.78rem;color:rgba(255,255,255,.6);}
.tp-tag{font-size:.52rem;letter-spacing:.12em;text-transform:uppercase;border:1px solid rgba(255,255,255,0.36);color:rgba(255,255,255,0.43);padding:2px 6px;margin-left:auto;}
.tp-urgent{border-color:rgba(240,100,80,.3);color:rgba(240,100,80,.6);}

/* Done screen */
.done-screen{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:60px 40px;
  position:relative;z-index:2;
  animation:fadeUp .6s ease both;
}
.done-lh{margin-bottom:32px;opacity:.8;}
.done-title{font-family:'Bodoni Moda',serif;font-size:clamp(2rem,5vw,3.2rem);color:var(--white);margin-bottom:12px;line-height:1.1;}
.done-title em{font-style:italic;color:rgba(255,255,255,0.52);}
.done-sub{font-family:'EB Garamond',serif;font-style:italic;font-size:1.1rem;color:rgba(255,255,255,.45);max-width:480px;line-height:1.8;margin-bottom:48px;}
.done-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.done-btn{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;padding:15px 36px;font-family:'Jost',sans-serif;font-weight:500;cursor:none;transition:background .3s,color .3s;border:none;}
.done-btn-primary{background:var(--beam);color:var(--black);}
.done-btn-primary:hover{background:var(--white);}
.done-btn-ghost{background:transparent;color:rgba(255,255,255,0.52);border:1px solid rgba(255,255,255,0.4);}
.done-btn-ghost:hover{border-color:rgba(255,255,255,0.48);color:var(--white);}
.done-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:48px;max-width:560px;width:100%;}
.done-step{background:rgba(255,255,255,0.31);border:1px solid rgba(255,255,255,0.34);padding:20px 18px;text-align:left;}
.ds-num{font-family:'Bodoni Moda',serif;font-size:1.4rem;color:rgba(255,255,255,0.38);font-style:italic;margin-bottom:8px;}
.ds-title{font-size:.72rem;color:var(--white);margin-bottom:4px;}
.ds-desc{font-size:.65rem;font-weight:300;color:var(--silver);line-height:1.5;}

/* ANIMS */
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes choicesIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── MOBILE ── */
@media (max-width: 768px) {
  body { cursor: auto; overflow: hidden; }
  .cursor, .cursor-ring { display: none; }
  * { cursor: auto !important; }

  .ob-nav { padding: 0 16px; height: 48px; }
  .ob-logo { font-size: .82rem; }
  .ob-progress-wrap { gap: 8px; }
  .ob-progress-label { display: none; }
  .ob-progress-track { width: 80px; }
  .ob-skip { font-size: .54rem; }

  .ob-convo { padding: 0 16px; max-width: 100%; }
  .ob-feed { padding: 20px 0 12px; }

  .guide-bubble { font-size: .95rem; padding: 14px 16px; }
  .guide-bubble.large { font-size: 1.05rem; }
  .guide-name { font-size: .5rem; }
  .guide-avatar { width: 28px; height: 28px; }

  .user-bubble { font-size: .8rem; padding: 11px 14px; max-width: 85%; }

  .choice-card { padding: 13px 16px; }
  .choice-title { font-size: .82rem; }
  .choice-desc { font-size: .68rem; }

  .ob-choices.row { flex-direction: column; }
  .ob-choices.row .choice-card { flex-direction: row; gap: 12px; align-items: flex-start; }

  .plan-cards { grid-template-columns: 1fr; gap: 6px; }
  .pc-name { font-size: .88rem; }
  .pc-features { display: none; }
  .plan-card.selected .pc-features { display: flex; }
  .plan-card { padding: 16px 14px; }

  .ob-input-zone { padding: 12px 0 20px; }
  .ob-text-input { font-size: .85rem; padding: 13px 14px; }
  .ob-send { padding: 13px 18px; font-size: .6rem; }

  .invite-row { flex-wrap: wrap; gap: 6px; }
  .invite-input { min-width: 0; flex: 1; font-size: .8rem; }
  .invite-add { flex-shrink: 0; }
  .invited-name { font-size: .72rem; }

  .done-screen { padding: 40px 20px; }
  .done-title { font-size: 1.8rem; }
  .done-sub { font-size: .95rem; margin-bottom: 28px; }
  .done-steps { grid-template-columns: 1fr; }
  .done-actions { flex-direction: column; width: 100%; }
  .done-btn { width: 100%; text-align: center; }
}

/* Photo panel — boardwalk */

<script>
// ── CURSOR ──
const cur=document.getElementById('cur'),cur2=document.getElementById('cur2');
let mx=0,my=0,tx=0,ty=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function loop(){tx+=(mx-tx)*.12;ty+=(my-ty)*.12;cur2.style.left=tx+'px';cur2.style.top=ty+'px';requestAnimationFrame(loop);})();

// ── STATE ──
const state={
  reason:null,       // 'planning' | 'bereaved'
  firstName:'',
  lastName:'',
  personName:'',     // name of deceased / self
  plan:null,
  firstTask:null,
  invites:[],
  step:0
};
const avatarColors=['#c8943a','#6b9ab8','#7a9168','#8c7a68','#9a7a8c'];
let avatarIdx=0;

// ── PROGRESS ──
const TOTAL_STEPS=8;
function setProgress(step,label){
  document.getElementById('progressFill').style.width=(step/TOTAL_STEPS*100)+'%';
  if(label) document.getElementById('progressLabel').textContent=label;
}

// ── FEED HELPERS ──
const feed=document.getElementById('feed');

function scrollFeed(){
  setTimeout(()=>feed.scrollTo({top:feed.scrollHeight,behavior:'smooth'}),50);
}

function addGuideMsg(html,delay=0,large=false){
  return new Promise(resolve=>{
    // Show typing first
    setTimeout(()=>{
      const typing=document.createElement('div');
      typing.className='msg-guide';
      typing.innerHTML=`<div class="guide-avatar"><svg viewBox="0 0 16 24" fill="none"><rect x="4.5" y="1" width="5" height="2" rx=".6" fill="white"/><rect x="3" y="3" width="8" height="6" rx=".6" fill="white"/><path d="M1 9 L13 9 L14 16 L0 16 Z" fill="white" opacity=".6"/><path d="M0 16 L14 16 L14 23 L0 23 Z" fill="white" opacity=".4"/><circle cx="7" cy="5" r="1.4" fill="#f5c842" opacity=".9"/></svg></div><div class="guide-bubble-wrap"><div class="guide-name">After Matters Guide</div><div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
      feed.appendChild(typing);
      scrollFeed();

      setTimeout(()=>{
        typing.remove();
        const msg=document.createElement('div');
        msg.className='msg-guide';
        msg.innerHTML=`<div class="guide-avatar"><svg viewBox="0 0 16 24" fill="none"><rect x="4.5" y="1" width="5" height="2" rx=".6" fill="white"/><rect x="3" y="3" width="8" height="6" rx=".6" fill="white"/><path d="M1 9 L13 9 L14 16 L0 16 Z" fill="white" opacity=".6"/><path d="M0 16 L14 16 L14 23 L0 23 Z" fill="white" opacity=".4"/><circle cx="7" cy="5" r="1.4" fill="#f5c842" opacity=".9"/></svg></div><div class="guide-bubble-wrap"><div class="guide-name">After Matters Guide</div><div class="guide-bubble${large?' large':''}">${html}</div></div>`;
        feed.appendChild(msg);
        scrollFeed();
        resolve();
      },900+Math.random()*400);
    },delay);
  });
}

function addUserMsg(text){
  const el=document.createElement('div');
  el.className='msg-user';
  el.innerHTML=`<div class="user-bubble">${text}</div>`;
  feed.appendChild(el);
  scrollFeed();
}

function addChoices(choices,callback,row=false){
  const wrap=document.createElement('div');
  wrap.className='ob-choices'+(row?' row':'');
  wrap.style.animationDelay='.2s';
  choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='choice-card';
    btn.innerHTML=`${c.icon?`<div class="choice-icon">${c.icon}</div>`:''}<div class="choice-body"><div class="choice-title">${c.title}</div>${c.desc?`<div class="choice-desc">${c.desc}</div>`:''}</div>`;
    btn.onclick=()=>{
      wrap.querySelectorAll('.choice-card').forEach(b=>b.style.pointerEvents='none');
      btn.classList.add('selected');
      setTimeout(()=>{
        addUserMsg(c.title);
        wrap.remove();
        callback(c);
      },300);
    };
    wrap.appendChild(btn);
  });
  feed.appendChild(wrap);
  scrollFeed();
}

function showTextInput(placeholder,callback){
  const zone=document.getElementById('inputZone');
  const input=document.getElementById('textInput');
  input.placeholder=placeholder;
  input.value='';
  zone.style.display='block';
  setTimeout(()=>input.focus(),100);
  window._textCallback=callback;
}

function submitText(){
  const input=document.getElementById('textInput');
  const val=input.value.trim();
  if(!val) return;
  document.getElementById('inputZone').style.display='none';
  addUserMsg(val);
  if(window._textCallback) window._textCallback(val);
}

function addPlanCards(callback){
  const plans=[
    {tier:'Shoreline',name:'Free forever',price:'$0 / month',rec:false,features:['Life Closure Checklist','Community forums','1 Memorial page','500MB storage'],val:'shoreline'},
    {tier:'Harbour',name:'Most popular',price:'$15 NZD / month',rec:true,features:['The Waypoint','Inner Circle (6 people)','Document Vault (5GB)','3 Memorial pages','AI Guide'],val:'harbour'},
    {tier:'Lighthouse',name:'Families & professionals',price:'$29 NZD / month',rec:false,features:['Inner Circle (20 people)','Document Vault (50GB)','Unlimited memorials','Phone support (NZ)'],val:'lighthouse'}
  ];
  const wrap=document.createElement('div');
  wrap.className='plan-cards';
  plans.forEach(p=>{
    const btn=document.createElement('button');
    btn.className='plan-card'+(p.rec?' recommended':'');
    btn.innerHTML=`${p.rec?`<div class="pc-rec">Recommended</div>`:''}<div class="pc-tier">${p.tier}</div><div class="pc-name">${p.name}</div><div class="pc-price">${p.price}</div><div class="pc-features">${p.features.map(f=>`<div class="pc-feat">${f}</div>`).join('')}</div>`;
    btn.onclick=()=>{
      wrap.querySelectorAll('.plan-card').forEach(b=>b.style.pointerEvents='none');
      btn.classList.add('selected');
      setTimeout(()=>{
        addUserMsg(p.tier+' plan');
        wrap.remove();
        callback(p);
      },300);
    };
    wrap.appendChild(btn);
  });
  feed.appendChild(wrap);
  scrollFeed();
}

// ── INVITE WIDGET ──
function addInviteWidget(callback){
  const wrap=document.createElement('div');
  wrap.className='invite-widget';
  wrap.style.animation='msgIn .4s ease both';
  wrap.style.marginBottom='20px';

  const invitedList=document.createElement('div');
  invitedList.className='invited-list';
  invitedList.id='invitedList';

  const row=document.createElement('div');
  row.className='invite-row';
  row.innerHTML=`<input class="invite-input" type="text" id="inviteNameInput" placeholder="Their name"><input class="invite-input" type="email" id="inviteEmailInput" placeholder="Email address"><button class="invite-add" onclick="addInvitee()">+ Add</button>`;

  const skipBtn=document.createElement('button');
  skipBtn.className='ob-send';
  skipBtn.style.cssText='margin-top:12px;width:100%;';
  skipBtn.textContent='Continue →';
  skipBtn.onclick=()=>{
    wrap.remove();
    callback(state.invites);
  };

  wrap.appendChild(invitedList);
  wrap.appendChild(row);
  wrap.appendChild(skipBtn);
  feed.appendChild(wrap);
  scrollFeed();

  window._inviteCallback=callback;
  window._inviteWrap=wrap;
}

function addInvitee(){
  const name=document.getElementById('inviteNameInput').value.trim();
  const email=document.getElementById('inviteEmailInput').value.trim();
  if(!name) return;
  const initials=name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const color=avatarColors[avatarIdx%avatarColors.length]; avatarIdx++;
  state.invites.push({name,email,initials,color});
  const list=document.getElementById('invitedList');
  const item=document.createElement('div');
  item.className='invited-item';
  item.style.animation='msgIn .3s ease both';
  item.innerHTML=`<div class="invited-avatar" style="background:${color};">${initials}</div><div class="invited-name">${name}${email?' · '+email:''}</div><div class="invited-status">Invite ready</div>`;
  list.appendChild(item);
  document.getElementById('inviteNameInput').value='';
  document.getElementById('inviteEmailInput').value='';
  document.getElementById('inviteNameInput').focus();
  scrollFeed();
}

// ── TASK PREVIEW ──
function addTaskPreview(tasks){
  const wrap=document.createElement('div');
  wrap.className='task-preview';
  wrap.style.animation='msgIn .4s ease both';
  wrap.style.marginBottom='16px';
  wrap.innerHTML=`<div class="tp-header">Your first tasks</div>${tasks.map(t=>`<div class="tp-item"><div class="tp-cb"></div><div class="tp-text">${t.text}</div><div class="tp-tag${t.urgent?' tp-urgent':''}">${t.tag}</div></div>`).join('')}`;
  feed.appendChild(wrap);
  scrollFeed();
}

// ── THE FLOW ──
async function runFlow(){

  // STEP 1 — Welcome
  setProgress(1,'Welcome');
  await addGuideMsg(`Kia ora. <strong>Welcome to After Matters.</strong><br><br>I'm here to help you get set up. I'll ask you a few gentle questions — it should take about two minutes.`,0,true);

  await addGuideMsg(`First — what brings you here today?`,600);

  addChoices([
    {title:'I\'m planning ahead for myself',desc:'Setting things up so my family won\'t be left guessing.',icon:'<svg width="16" height="20" viewBox="0 0 16 20" fill="none"><circle cx="8" cy="4" r="3" stroke="currentColor" stroke-width=".9" fill="none"/><line x1="8" y1="7" x2="8" y2="15" stroke="currentColor" stroke-width=".9"/><line x1="2" y1="9" x2="14" y2="9" stroke="currentColor" stroke-width=".9"/><path d="M8 15 Q3 13 2 15 Q4 18 6.5 17 L8 15Z" fill="none" stroke="currentColor" stroke-width=".85"/><path d="M8 15 Q13 13 14 15 Q12 18 9.5 17 L8 15Z" fill="none" stroke="currentColor" stroke-width=".85"/></svg>'},
    {title:'Someone I love has died',desc:'I need help with what comes next.',icon:'<svg width="12" height="18" viewBox="0 0 12 18" fill="none"><path d="M6 2 C6 2 3.5 5.5 3.5 7.5 a2.5 2.5 0 005 0 C8.5 5.5 6 2 6 2Z" stroke="currentColor" stroke-width=".9" fill="none"/><line x1="6" y1="10" x2="6" y2="13" stroke="currentColor" stroke-width=".85"/><rect x="2.5" y="13" width="7" height="4" rx=".5" fill="none" stroke="currentColor" stroke-width=".8" opacity=".5"/></svg>'},
  ],async(choice)=>{
    state.reason = choice.title.includes('planning') ? 'planning' : 'bereaved';

    // STEP 2 — Name
    setProgress(2,'Your details');
    if(state.reason==='planning'){
      await addGuideMsg(`That's a truly generous thing to do for the people you love. Let's build something that will carry them through.<br><br>What's your first name?`,400);
    } else {
      await addGuideMsg(`I'm so sorry for your loss. You're in the right place — we'll take this one step at a time, together.<br><br>What's your first name?`,400);
    }
    showTextInput('Your first name…',async(first)=>{
      state.firstName=first;

      await addGuideMsg(`Thank you, ${first}. And your last name?`,300);
      showTextInput('Your last name…',async(last)=>{
        state.lastName=last;

        // STEP 3 — Who
        setProgress(3,'The person');
        if(state.reason==='planning'){
          await addGuideMsg(`Good to meet you, <strong>${first} ${last}</strong>.<br><br>We'll set up your planning space in your name. Is there anything specific you'd like to call it — or shall we use your name?`,400);
          showTextInput(`${first}'s planning space…`,async(spaceName)=>{
            state.personName = spaceName || `${first} ${last}`;
            await continueAfterPerson();
          });
        } else {
          await addGuideMsg(`Good to meet you, <strong>${first}</strong>.<br><br>Who has passed? What was their name?`,400);
          showTextInput('Their full name…',async(personName)=>{
            state.personName=personName;
            const firstName=personName.split(' ')[0];

            await addGuideMsg(`<strong>${personName}</strong>. Thank you for telling me about them.<br><br>We'll set up a space in ${firstName}'s name — your dashboard, their memorial, everything organised around them.`,400);
            await continueAfterPerson();
          });
        }
      });
    });
  });
}

async function continueAfterPerson(){
  // STEP 4 — Plan
  setProgress(4,'Your plan');
  await addGuideMsg(`Now — which plan suits you best? You can always change this later, and you can start free.`,600);
  addPlanCards(async(plan)=>{
    state.plan=plan;

    // STEP 5 — First task
    setProgress(5,'First steps');
    const tasks = state.reason==='bereaved' ? [
      {text:'Register the death with Births, Deaths & Marriages NZ',tag:'Urgent',urgent:true},
      {text:'Order certified copies of the death certificate',tag:'Urgent',urgent:true},
      {text:'Notify Work and Income NZ / IRD',tag:'Important',urgent:false},
      {text:'Confirm funeral director arrangements',tag:'Important',urgent:false},
      {text:`Create ${state.personName.split(' ')[0]}'s memorial page`,tag:'When ready',urgent:false},
    ] : [
      {text:'Write or update your will',tag:'Legal',urgent:false},
      {text:'Set up your Document Vault — upload key documents',tag:'Important',urgent:false},
      {text:'Complete your Life Closure Checklist',tag:'When ready',urgent:false},
      {text:'Invite your inner circle',tag:'When ready',urgent:false},
      {text:'Create your memorial page',tag:'When ready',urgent:false},
    ];

    if(state.reason==='bereaved'){
      await addGuideMsg(`Here's what needs to happen in the coming days. Your task list is waiting for you — I've added the most urgent steps first.`,400);
    } else {
      await addGuideMsg(`Here's a suggested starting point for your planning. Nothing is urgent — you can work through these at your own pace.`,400);
    }
    addTaskPreview(tasks);

    // STEP 6 — Inner circle
    setProgress(6,'Inner circle');
    await addGuideMsg(`One of the most important things you can do right now is invite your <strong>inner circle</strong> — the people who'll help carry this with you.<br><br>Would you like to invite anyone now? You can always do this later.`,800);

    addChoices([
      {title:'Yes, invite people now',desc:'Takes 30 seconds.',icon:'<svg width="16" height="12" viewBox="0 0 16 12" fill="none"><circle cx="5.5" cy="4" r="3" fill="none" stroke="currentColor" stroke-width=".85"/><path d="M1 11 C1 8.5 3 7 5.5 7 C8 7 10 8.5 10 11" stroke="currentColor" stroke-width=".85" fill="none"/><circle cx="11.5" cy="4" r="2.3" fill="none" stroke="currentColor" stroke-width=".7" opacity=".5"/><path d="M10 11 C10 9 11.2 8 13.5 8" stroke="currentColor" stroke-width=".7" fill="none" opacity=".5"/></svg>'},
      {title:'I\'ll do this later',desc:'You can invite people from your dashboard.',icon:'<svg width="14" height="10" viewBox="0 0 14 10" fill="none"><line x1="1" y1="5" x2="12" y2="5" stroke="currentColor" stroke-width=".9" stroke-linecap="round"/><path d="M8.5 1.5 L12.5 5 L8.5 8.5" stroke="currentColor" stroke-width=".9" fill="none" stroke-linecap="round"/></svg>'},
    ],async(choice)=>{
      if(choice.title.includes('Yes')){
        await addGuideMsg(`Add their name and email — we'll send them a warm invitation to join your inner circle.`,400);
        addInviteWidget(async(invites)=>{
          await finishFlow(invites);
        });
      } else {
        await finishFlow([]);
      }
    });
  });
}

async function finishFlow(invites){
  // STEP 7 — Done
  setProgress(TOTAL_STEPS,'All set');
  const firstName=state.firstName;
  const personFirst=state.personName.split(' ')[0];
  const isPlanning=state.reason==='planning';

  await addGuideMsg(
    isPlanning
      ? `You're all set, <strong>${firstName}</strong>. Your planning space is ready — and what you're doing is one of the most loving things you'll ever do for your family.`
      : `You're all set, <strong>${firstName}</strong>. ${personFirst}'s space is ready. Take it one step at a time — there's no rush here.`,
    400
  );

  setTimeout(()=>{
    document.getElementById('convo').style.display='none';
    const done=document.getElementById('doneScreen');
    done.style.display='flex';
    done.querySelector('#doneTitle').innerHTML=isPlanning
      ? `You're in <em>the harbour.</em>`
      : `${personFirst} <em>is remembered.</em>`;
    done.querySelector('#doneSub').textContent=isPlanning
      ? `Your planning space is ready. Work through it at your own pace — everything is saved as you go.`
      : `${state.personName}'s space is set up and waiting. The people who love them can find everything here.`;

    const nextSteps=isPlanning ? [
      {n:'01',title:'Complete your checklist',desc:'Work through the Life Closure Checklist at your own pace.'},
      {n:'02',title:'Upload to your vault',desc:'Add your will, insurance and key documents to your Document Vault.'},
      {n:'03',title:'Build your memorial',desc:'Create the page that will carry your story forward.'},
    ] : [
      {n:'01',title:'Register the death',desc:'Visit bdmonline.govt.nz to register with BDM within 3 working days.'},
      {n:'02',title:'Plan the service',desc:'Open the The Waypoint to start planning the memorial.'},
      {n:'03',title:`Remember ${personFirst}`,desc:`Build ${personFirst}'s memorial page — a permanent place to gather.`},
    ];
    document.getElementById('doneSteps').innerHTML=nextSteps.map(s=>`<div class="done-step"><div class="ds-num">${s.n}</div><div class="ds-title">${s.title}</div><div class="ds-desc">${s.desc}</div></div>`).join('');
  },2000);
}

function skipToEnd(){
  document.getElementById('convo').style.display='none';
  const done=document.getElementById('doneScreen');
  done.style.display='flex';
  setProgress(TOTAL_STEPS,'All set');
}

// Start
runFlow();
</script>

  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="#f5c842" stroke-width="1.3"><circle cx="8" cy="8" r="6"/><line x1="8" y1="6" x2="8" y2="8"/><circle cx="8" cy="11" r=".8" fill="#f5c842"/></svg>
  <span>Edit mode on</span> - click any text to edit it
</div>

<script>
(function() {
  let amEditing = false;
  let amOriginals = new Map();
  let amChanges = 0;

  // Tags we'll make editable — text content only, skip scripts/styles/inputs
  const EDITABLE_TAGS = ['p','h1','h2','h3','h4','h5','h6','span','div','a','li','td','th','label','blockquote','figcaption','small','strong','em','b','i'];
  // Classes/ids to skip
  const SKIP_IDS = ['am-editor-btn','am-save-bar','am-edit-hint','am-change-count'];
  const SKIP_CLASSES = ['am-editable','am-bar-btn','cursor','cursor-ring','tab-bar','tab-item'];

  function shouldSkip(el) {
    if (!el || !el.id && !el.className) return false;
    if (SKIP_IDS.some(id => el.id === id)) return true;
    if (el.closest && el.closest('#am-save-bar, #am-editor-btn, #am-edit-hint')) return true;
    return false;
  }

  function isTextLeaf(el) {
    // Only make elements editable if they contain direct text (not just child elements)
    if (shouldSkip(el)) return false;
    const text = Array.from(el.childNodes)
      .filter(n => n.nodeType === 3)
      .map(n => n.textContent.trim())
      .join('');
    return text.length > 1;
  }

  window.amToggleEdit = function() {
    amEditing = !amEditing;
    const btn = document.getElementById('am-editor-btn');
    const hint = document.getElementById('am-edit-hint');
    const saveBar = document.getElementById('am-save-bar');

    if (amEditing) {
      btn.classList.add('editing');
      btn.querySelector('svg').style.display = 'none';
      btn.childNodes[2].textContent = ' Stop Editing';
      hint.classList.add('visible');
      saveBar.classList.add('visible');
      enableEditing();
    } else {
      btn.classList.remove('editing');
      btn.querySelector('svg').style.display = '';
      btn.childNodes[2].textContent = ' Edit Page';
      hint.classList.remove('visible');
      disableEditing();
    }
  };

  function enableEditing() {
    EDITABLE_TAGS.forEach(tag => {
      document.querySelectorAll(tag).forEach(el => {
        if (shouldSkip(el)) return;
        if (!isTextLeaf(el)) return;
        if (el.classList.contains('am-editable')) return;
        // Store original
        if (!amOriginals.has(el)) {
          amOriginals.set(el, el.innerHTML);
        }
        el.classList.add('am-editable');
        el.contentEditable = 'true';
        el.spellcheck = true;
        el.addEventListener('input', amOnInput);
      });
    });
  }

  function disableEditing() {
    document.querySelectorAll('.am-editable').forEach(el => {
      el.classList.remove('am-editable');
      el.contentEditable = 'false';
    });
  }

  function amOnInput(e) {
    const el = e.target;
    const original = amOriginals.get(el);
    const changed = el.innerHTML !== original;
    // Track unique changed elements
    const changedEls = new Set();
    amOriginals.forEach((orig, node) => {
      if (node.innerHTML !== orig) changedEls.add(node);
    });
    amChanges = changedEls.size;
    updateChangeCount();
  }

  function updateChangeCount() {
    const badge = document.getElementById('am-change-count');
    const label = document.getElementById('am-changes-label');
    if (amChanges > 0) {
      badge.textContent = amChanges;
      badge.classList.add('visible');
    } else {
      badge.classList.remove('visible');
    }
    if (label) label.textContent = amChanges + (amChanges === 1 ? ' change' : ' changes');
  }

  window.amCancelEdit = function() {
    // Restore originals
    amOriginals.forEach((orig, el) => {
      el.innerHTML = orig;
    });
    amChanges = 0;
    updateChangeCount();
    amOriginals.clear();
    amEditing = true;
    amToggleEdit(); // turn off
  };

  window.amSavePage = function() {
    // Turn off editing mode cleanly
    disableEditing();
    // Remove editor UI from the clone
    const clone = document.documentElement.cloneNode(true);
    // Remove all am-editable classes from clone
    clone.querySelectorAll('.am-editable').forEach(el => {
      el.classList.remove('am-editable');
      el.removeAttribute('contenteditable');
      el.removeAttribute('spellcheck');
    });
    // Get filename from page title or URL
    const rawTitle = document.title
      .toLowerCase()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-|-$/g, '') || 'page';
    const filename = rawTitle + '.html';
    // Serialize and download
    const html = '<!DOCTYPE html>\n' + clone.outerHTML;
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
    // Re-enable editing
    if (amEditing) enableEditing();
    // Show success
    const msg = document.getElementById('am-save-bar-msg');
    const orig = msg.innerHTML;
    msg.innerHTML = '<strong style="color:#4a9e7a">✓ File downloaded!</strong> Replace the old file on Netlify to publish your changes.';
    setTimeout(() => { msg.innerHTML = orig; updateChangeCount(); }, 4000);
  };
})();
</script>
